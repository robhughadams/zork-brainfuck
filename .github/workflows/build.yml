name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Cache venv
      id: cache-venv
      uses: actions/cache@v4
      with:
        path: venv
        key: venv-${{ runner.os }}-py3.13-${{ hashFiles('game/', 'src/', 'tests/') }}
        restore-keys: |
          venv-${{ runner.os }}-py3.13-
    
    - name: Create venv and install
      run: |
        if [ ! -d "venv" ]; then python -m venv venv; fi
        venv/bin/pip install --upgrade pip pytest
    
    - name: Run tests
      run: |
        venv/bin/pytest tests/ -v
    
    - name: Build game
      run: |
        venv/bin/python src/preprocess.py game/game.py
        venv/bin/python -m py_compile game/game.pre.py
        venv/bin/python -m src.transpile < game/game.pre.py > game.bf
    
    - name: Install brainfuck
      run: sudo apt-get install -y beef
    
    - name: Verify game runs
      run: |
        beef game.bf <<< $'\n\n\n\n\n\n\n'
